<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alertas de Vacunas</title>
  <style>
   body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
  color: #333;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #362A6F; /* Azul */
}

.alertas-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

.grupo {
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.grupo h2 {
  margin-top: 0;
  font-size: 18px;
  border-bottom: 2px solid #C42685; /* Magenta */
  padding-bottom: 6px;
  color: #C42685;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 14px;
}

th, td {
  padding: 10px 8px;
  text-align: left;
  border-bottom: 1px solid #eee;
  color: #362A6F;
}

th {
  background: #f0f0f0;
  font-weight: 700;
}

.sin-alertas {
  text-align: center;
  font-style: italic;
  color: #888;
  padding: 15px 0;
  font-size: 15px;
}

/* Enlaces de WhatsApp */
a.whatsapp-link {
  color: #C42685;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.3s ease;
}

a.whatsapp-link:hover {
  color: #362A6F;
}

/* Botón flotante */
.boton-flotante {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background-color: #362A6F; 
  color: white;
  font-size: 16px;
  font-weight: bold;
  padding: 15px 25px;
  border-radius: 50px;
  text-decoration: none;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  transition: background-color 0.3s ease, transform 0.2s ease;
  z-index: 999;
}

.boton-flotante:hover {
  background-color: #C42685;
  transform: scale(1.05);
}

/* Responsive para pantallas pequeñas */
@media (max-width: 600px) {
  body {
    padding: 12px;
  }

  .grupo {
    padding: 12px;
  }

  h1 {
    font-size: 22px;
  }

  .grupo h2 {
    font-size: 16px;
  }

  table {
    font-size: 12px;
  }

  th, td {
    padding: 8px 6px;
  }

  .boton-flotante {
    font-size: 14px;
    padding: 12px 20px;
    bottom: 15px;
    right: 15px;
  }
}

:root {
  --crema: #FAF6F0;
  --crema-oscuro: #F0E9DF;
  --rosa: #C42685;
  --rosa-suave: #F5E6F0;
  --violeta: #362A6F;
  --violeta-suave: #EAE8F5;
  --texto: #2A2235;
  --texto-suave: #7A6E85;
  --blanco: #FFFFFF;
  --sombra: 0 18px 50px rgba(54,42,111,0.12);
}
body {
  background: radial-gradient(circle at top right, rgba(196,38,133,.11), transparent 30%), var(--crema);
  color: var(--texto);
  padding: 0;
}
.app-navbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  padding:14px 28px;
  background:rgba(250,246,240,.92);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(196,38,133,.08);
}
.brand-link { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--violeta); }
.brand-link img { width:48px; height:48px; object-fit:contain; }
.brand-link span { display:flex; flex-direction:column; line-height:1.1; }
.brand-link strong, .reminders-hero h1, .grupo h2 { font-family:'Playfair Display',serif; }
.brand-link small { color:var(--texto-suave); font-size:.76rem; }
.app-navbar nav { display:flex; gap:10px; flex-wrap:wrap; }
.app-navbar nav a { color:var(--texto-suave); text-decoration:none; border:1px solid rgba(54,42,111,.12); border-radius:999px; padding:9px 14px; background:var(--blanco); }
.app-navbar nav a:hover { color:var(--blanco); background:var(--rosa); }
.reminders-hero { max-width:1000px; margin:34px auto 10px; padding:28px 20px; text-align:center; }
.app-badge { display:inline-flex; color:var(--rosa); background:var(--rosa-suave); border-radius:999px; padding:7px 15px; font-weight:700; font-size:.78rem; letter-spacing:.04em; text-transform:uppercase; margin-bottom:14px; }
.reminders-hero h1 { color:var(--violeta); font-size:clamp(2rem,5vw,3.4rem); margin:0 0 10px; }
.reminders-hero p { color:var(--texto-suave); line-height:1.7; }
.alertas-container { max-width:1120px; margin:0 auto 60px; padding:0 20px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:22px; }
.grupo { background:rgba(255,255,255,.92); border:1px solid rgba(196,38,133,.09); border-radius:26px; box-shadow:var(--sombra); }
.grupo h2 { color:var(--violeta); }
table { border-radius:18px; overflow:hidden; }
th { background:var(--violeta); color:var(--blanco); }
td, th { border-color:rgba(54,42,111,.08); }
a.whatsapp-link { display:inline-flex; border-radius:999px; padding:8px 12px; background:var(--rosa-suave); }
@media (max-width:800px){
  .app-navbar { align-items:flex-start; flex-direction:column; padding:14px 18px; }
  .alertas-container { grid-template-columns:1fr; padding:0 14px; }
}

  </style>
</head>
<body>
  <header class="app-navbar">
    <a class="brand-link" href="../index.html" aria-label="Volver al inicio">
      <img src="https://i.ibb.co/hFyg48KD/Logo-Dra-Bruzera.png" alt="Logo Dra. Lili Bruzera" />
      <span><strong>Dra. Lili Bruzera</strong><small>Recordatorios</small></span>
    </a>
    <nav>
      <a href="../panel/">Panel</a>
      <a href="../turnero.html">Turnero</a>
      <a href="../index.html#contacto">Contacto</a>
    </nav>
  </header>
  <section class="reminders-hero">
    <span class="app-badge">Seguimiento preventivo</span>
    <h1>📋 Vacunas próximas</h1>
    <p>Alertas conectadas al mismo Google Sheet para contactar a tutores por WhatsApp antes de la fecha indicada.</p>
  </section>
  <div class="alertas-container">
    <div class="grupo" id="semana">
      <h2>Vacunas de la semana (7 días)</h2>
      <div id="tablaSemana" class="sin-alertas">Cargando...</div>
    </div>
    <div class="grupo" id="mes">
      <h2>Vacunas del mes (30 días)</h2>
      <div id="tablaMes" class="sin-alertas">Cargando...</div>
    </div>
  </div>

  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwA_lwWMazJkNsZLctLld_O4tf4RFTSaOpxpx4LMJdOpwOgygwchokuea0QEY1mlzeQvQ/exec";

    function logConsole(msg) {
      // console.log(msg); // Puedes activar para debug en navegador
    }

    async function cargarAlertas() {
      try {
        logConsole("🔄 Cargando datos desde Apps Script...");
        const res = await fetch(`${scriptUrl}?buscar=todos`);
        const data = await res.json();

        const tablaSemana = document.getElementById("tablaSemana");
        const tablaMes = document.getElementById("tablaMes");

        if (!data.success || !data.resultados) {
          logConsole("❌ Error: No se pudieron obtener datos");
          tablaSemana.textContent = "Error cargando datos";
          tablaMes.textContent = "Error cargando datos";
          return;
        }

        logConsole(`✅ Datos recibidos: ${data.resultados.length} registros`);
        const hoy = new Date();
        const semana = [];
        const mes = [];

        data.resultados.forEach(r => {
          logConsole(`➡️ Mascota: ${r.nombreMascota} | Prox. Vacuna: ${r.proxima_vacuna}`);
          if (!r.proxima_vacuna) return;
          const fechaVacuna = parseFecha(r.proxima_vacuna);
          if (!fechaVacuna) {
            logConsole("⚠️ No se pudo parsear la fecha: " + r.proxima_vacuna);
            return;
          }

          const diff = Math.floor((fechaVacuna - hoy) / (1000 * 60 * 60 * 24));
          logConsole(`📅 Diferencia en días: ${diff}`);

          if (diff >= 0 && diff <= 7) {
            semana.push({ ...r, fecha: fechaVacuna });
          } else if (diff > 7 && diff <= 30) {
            mes.push({ ...r, fecha: fechaVacuna });
          }
        });

        renderTabla(semana, tablaSemana, "semana");
        renderTabla(mes, tablaMes, "mes");

      } catch (error) {
        logConsole("❌ Error en fetch: " + error.message);
      }
    }

 function renderTabla(lista, contenedor, tipo) {
  if (lista.length === 0) {
    contenedor.innerHTML = `<div class="sin-alertas">✅ No hay vacunas programadas en este período</div>`;
    logConsole(`ℹ️ No hay vacunas para ${tipo}`);
    return;
  }
  logConsole(`📋 Mostrando ${lista.length} vacunas para ${tipo}`);

  const filas = lista.map(item => {
    const texto = `Hola! Este es un recordatorio para que ${item.nombreMascota} (DNI: ${item.dniMascota}), cuyo dueño es ${item.nombre}, reciba su vacuna el día ${item.fecha.toLocaleDateString()}.`;
    const textoUrl = encodeURIComponent(texto);

    // Aquí el cambio clave para que funcione en móvil
    const waLink = `https://api.whatsapp.com/send?text=${textoUrl}`;

    return `
      <tr>
        <td>${item.nombre}</td>
        <td>${item.nombreMascota}</td>
        <td>${item.dniMascota}</td>
        <td>${item.fecha.toLocaleDateString()}</td>
        <td><a href="${waLink}" target="_blank" rel="noopener" class="whatsapp-link">Compartir WhatsApp</a></td>
      </tr>
    `;
  }).join("");

  contenedor.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Dueño</th>
          <th>Mascota</th>
          <th>DNI Mascota</th>
          <th>Fecha Próxima Vacuna</th>
          <th>Compartir</th>
        </tr>
      </thead>
      <tbody>
        ${filas}
      </tbody>
    </table>
  `;
}


    function parseFecha(fechaStr) {
      if (!fechaStr) return null;

      if (fechaStr instanceof Date) return fechaStr;

      if (typeof fechaStr === "string" && fechaStr.includes("T")) {
        const fechaISO = new Date(fechaStr);
        return isNaN(fechaISO) ? null : fechaISO;
      }

      if (typeof fechaStr === "string" && fechaStr.includes("/")) {
        const partes = fechaStr.split("/");
        if (partes.length === 3) {
          return new Date(partes[2], partes[1] - 1, partes[0]);
        }
      }

      if (typeof fechaStr === "string" && fechaStr.includes("-")) {
        const partes = fechaStr.split("-");
        if (partes.length === 3) {
          return new Date(partes[0], partes[1] - 1, partes[2]);
        }
      }

      const fechaAuto = new Date(fechaStr);
      return isNaN(fechaAuto) ? null : fechaAuto;
    }

    cargarAlertas();
  </script>
</body>
</html>
